<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DISC Hub · Konclui</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --D:#7F77DD;--Dl:#EDEAFF;--Dd:#5043C0;
    --I:#EF9F27;--Il:#FEF4DC;--Id:#B87000;
    --S:#1D9E75;--Sl:#D5F5EB;--Sd:#0E6B4F;
    --C:#378ADD;--Cl:#DCEEFF;--Cd:#1557A6;
    --bg:#F7F8FC;--card:#fff;--nav:#16192A;
    --text:#16192A;--text2:#6B7280;--border:#E5E7EB;--r:12px;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* LOGIN */
  .lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--nav);}
  .lc{background:#fff;border-radius:20px;padding:40px 48px;width:100%;max-width:420px;}
  .ll{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
  .lt{font-size:28px;font-weight:800;margin-bottom:32px;}
  .fg{margin-bottom:16px;}
  .fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .fg input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
  .fg input:focus{border-color:var(--D);}
  .bp{width:100%;padding:14px;background:var(--D);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .bp:hover{opacity:.9;}
  .lerr{color:#E53E3E;font-size:13px;margin-top:8px;display:none;}

  /* SETUP */
  .sw{min-height:100vh;background:var(--nav);display:flex;align-items:center;justify-content:center;padding:24px;}
  .sc{background:#fff;border-radius:20px;padding:40px 48px;width:100%;max-width:560px;}

  /* APP SHELL */
  .shell{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--nav);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;padding:0;z-index:100;}
  .slogo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
  .slogo .an{font-size:18px;font-weight:800;color:#fff;}
  .slogo .as{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;margin:2px 8px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:14px;font-weight:500;transition:all .15s;border:none;background:none;font-family:inherit;width:calc(100% - 16px);text-align:left;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav-item.active{background:rgba(127,119,221,.25);color:#fff;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sbottom{margin-top:auto;padding:12px;}
  .upill{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.07);border-radius:10px;}
  .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
  .main{margin-left:220px;flex:1;min-height:100vh;}
  .ph{padding:28px 32px 0;}
  .pt{font-size:22px;font-weight:800;}
  .ps{font-size:14px;color:var(--text2);margin-top:4px;}
  .pc{padding:24px 32px;}

  /* TABS */
  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:24px;}
  .tab-btn{padding:10px 16px;font-size:14px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;}
  .tab-btn.active{color:var(--D);border-bottom-color:var(--D);}
  .tab-btn:hover:not(.active){color:var(--text);}

  /* CARDS */
  .card{background:var(--card);border-radius:var(--r);padding:20px 24px;border:1px solid var(--border);}
  .ct{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:4px;}
  .cv{font-size:32px;font-weight:800;}
  .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

  /* DISC BADGE */
  .db{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-weight:800;font-size:13px;flex-shrink:0;}
  .db.D{background:var(--Dl);color:var(--Dd);}
  .db.I{background:var(--Il);color:var(--Id);}
  .db.S{background:var(--Sl);color:var(--Sd);}
  .db.C{background:var(--Cl);color:var(--Cd);}
  .db.none{background:#F3F4F6;color:#9CA3AF;}

  /* QUIZ */
  .qcard{background:var(--card);border-radius:var(--r);padding:32px;max-width:600px;border:1px solid var(--border);}
  .qprog{display:flex;gap:6px;margin-bottom:24px;}
  .qdot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
  .qdot.done{background:var(--D);}
  .qq{font-size:18px;font-weight:700;margin-bottom:20px;line-height:1.4;}
  .qopts{display:flex;flex-direction:column;gap:10px;}
  .qopt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:#fff;font-family:inherit;text-align:left;transition:all .15s;width:100%;}
  .qopt:hover{border-color:var(--D);background:var(--Dl);}
  .qopt.sel{border-color:var(--D);background:var(--Dl);}
  .qe{font-size:20px;flex-shrink:0;}
  .qt{font-size:14px;color:var(--text);line-height:1.5;}
  .qnav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;}
  .bnext{padding:12px 24px;background:var(--D);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .bnext:disabled{opacity:.35;cursor:default;}
  .bsm{padding:7px 14px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;color:var(--text);}
  .bsm:disabled{opacity:.4;cursor:default;}

  /* RESULT */
  .rh{border-radius:var(--r) var(--r) 0 0;padding:28px 32px;color:#fff;}
  .rb{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:24px 32px;}
  .ibox{background:var(--bg);border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:14px;line-height:1.6;}
  .alist{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
  .anum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px;}

  /* OUTCOME */
  .obox{border-top:1px solid var(--border);padding-top:20px;margin-top:20px;}
  .oopts{display:flex;gap:10px;margin-top:10px;}
  .obtn{flex:1;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s;}
  .obtn.g{color:#059669;} .obtn.g:hover,.obtn.g.sel{background:#D1FAE5;border-color:#059669;}
  .obtn.f{color:#D97706;} .obtn.f:hover,.obtn.f.sel{background:#FEF3C7;border-color:#D97706;}
  .obtn.p{color:#DC2626;} .obtn.p:hover,.obtn.p.sel{background:#FEE2E2;border-color:#DC2626;}
  .bcta{padding:12px 24px;background:var(--D);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;width:100%;}

  /* HISTORY */
  .mr{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);}
  .mr:last-child{border-bottom:none;}
  .otag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .otag.ganho{background:#D1FAE5;color:#059669;}
  .otag.followup{background:#FEF3C7;color:#D97706;}
  .otag.perdido{background:#FEE2E2;color:#DC2626;}
  .otag.pend{background:#F3F4F6;color:#6B7280;}

  /* STAT BARS */
  .sbr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .sbl{width:24px;font-size:12px;font-weight:800;text-align:center;}
  .sbt{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
  .sbf{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .sbn{width:36px;font-size:12px;color:var(--text2);text-align:right;}

  /* MEMBER CARD */
  .mc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:14px;}

  /* MISC */
  .st{font-size:16px;font-weight:700;margin-bottom:16px;}
  .es{text-align:center;padding:48px 0;color:var(--text2);}
  .sbanner{background:#D1FAE5;border:1px solid #6EE7B7;border-radius:10px;padding:14px 20px;font-size:14px;color:#065F46;font-weight:600;margin-bottom:20px;}
  .fr{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .nsection{font-size:12px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;padding:20px 20px 6px;}

  @media(max-width:768px){
    .sidebar{width:60px;}
    .slogo,.nsection,nav-item span,.upill>div{display:none;}
    .nav-item{justify-content:center;padding:12px;margin:2px 4px;width:calc(100% - 8px);}
    .main{margin-left:60px;}
    .g4{grid-template-columns:repeat(2,1fr);}
    .g3{grid-template-columns:1fr 1fr;}
    .pc{padding:16px;}
    .ph{padding:16px 16px 0;}
    .fr{grid-template-columns:1fr;}
    .sc,.lc{padding:28px 24px;}
    .qcard,.rb{padding:20px;}
  }
  </style>
</head>

const DB = {
  getMeetings(){ return JSON.parse(localStorage.getItem('kh_m')||'[]'); },
  addMeeting(m){ const a=this.getMeetings(); a.push(m); localStorage.setItem('kh_m',JSON.stringify(a)); },
  editMeeting(id,upd){
    const a=this.getMeetings();
    const i=a.findIndex(x=>x.id===id);
    if(i>=0){ a[i]={...a[i],...upd}; localStorage.setItem('kh_m',JSON.stringify(a)); }
  },
  getProfiles(){ return JSON.parse(localStorage.getItem('kh_p')||'{}'); },
  setProfile(u,p){
    const a=this.getProfiles();
    if(p===null){ delete a[u]; } else { a[u]=p; }
    localStorage.setItem('kh_p',JSON.stringify(a));
  },
  getProfile(u){ return this.getProfiles()[u]||null; },
};

function td(){ return new Date().toISOString().split('T')[0]; }
function tnow(){ return new Date().toTimeString().slice(0,5); }

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function ini(n){ return n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase(); }
function dc(p){ return p?DISC_META[p].color:'#9CA3AF'; }
function dl(p){ return p?DISC_META[p].light:'#F3F4F6'; }
function dd(p){ return p?DISC_META[p].dark:'#6B7280'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fd(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return`${d}/${m}/${y}`; }

function detectDisc(ans){
  const c={D:0,I:0,S:0,C:0};
  ans.forEach(a=>{ if(c[a]!==undefined)c[a]++; });
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
}

function closerMeetings(u){ return DB.getMeetings().filter(m=>m.closer===u); }
function squadMeetings(sq){
  const cl=Object.keys(USERS).filter(k=>USERS[k].squad===sq&&USERS[k].role==='closer');
  return DB.getMeetings().filter(m=>cl.includes(m.closer));
}
function convRate(ms){
  const d=ms.filter(m=>m.outcome==='ganho'||m.outcome==='perdido');
  if(!d.length)return null;
  return Math.round(ms.filter(m=>m.outcome==='ganho').length/d.length*100);
}
function pStats(ms){
  return ['D','I','S','C'].map(p=>{
    const sub=ms.filter(m=>m.cp===p);
    return{p,n:sub.length,conv:convRate(sub)};
  });
}

function statsV(){
  const ms=closerMeetings(S.user);
  const g=ms.filter(m=>m.outcome==='ganho').length;
  const p=ms.filter(m=>m.outcome==='perdido').length;
  const f=ms.filter(m=>m.outcome==='followup').length;
  const d=g+p; const cr=d?Math.round(g/d*100):null;
  const ps=pStats(ms); const mx=Math.max(...ps.map(x=>x.n),1);
  const worst=ps.filter(x=>x.n>0&&x.conv!==null).sort((a,b)=>a.conv-b.conv)[0]||null;

  return`
    <div class="ph"><div class="pt">Meu Desempenho</div><div class="ps">Análise das suas reuniões</div></div>
    <div class="pc">
      <div class="g4" style="margin-bottom:20px">
        <div class="card"><div class="ct">Reuniões</div><div class="cv">${ms.length}</div></div>
        <div class="card"><div class="ct">Ganhos</div><div class="cv" style="color:#059669">${g}</div></div>
        <div class="card"><div class="ct">Follow-up</div><div class="cv" style="color:#D97706">${f}</div></div>
        <div class="card"><div class="ct">Conversão</div><div class="cv" style="color:var(--D)">${cr!==null?cr+'%':'—'}</div></div>
      </div>
      <div class="g2">
        <div class="card"><div class="st">Reuniões por perfil</div>
          ${ps.map(x=>`<div class="sbr">
            <div class="sbl" style="color:${dc(x.p)}">${x.p}</div>
            <div class="sbt"><div class="sbf" style="width:${x.n/mx*100}%;background:${dc(x.p)}"></div></div>
            <div class="sbn">${x.n}</div>
          </div>`).join('')}
        </div>
        <div class="card"><div class="st">Conversão por perfil</div>
          ${ps.map(x=>`<div class="sbr">
            <div class="sbl" style="color:${dc(x.p)}">${x.p}</div>
            <div class="sbt"><div class="sbf" style="width:${x.conv||0}%;background:${dc(x.p)}"></div></div>
            <div class="sbn">${x.conv!==null?x.conv+'%':'—'}</div>
          </div>`).join('')}
        </div>
      </div>
      ${worst?`<div class="card" style="margin-top:20px;border-left:4px solid ${dc(worst.p)}">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:${dc(worst.p)};margin-bottom:8px">💡 Plano de ação — perfil ${worst.p} (${worst.conv}% de conversão)</div>
        <div style="font-size:14px;color:#374151;margin-bottom:14px">${PROFILES[worst.p].insight}</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">O que fazer diferente:</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${PROFILES[worst.p].how.slice(0,3).map((h,i)=>`
            <div style="display:flex;gap:10px;align-items:flex-start">
              <div style="width:20px;height:20px;border-radius:50%;background:${dl(worst.p)};color:${dd(worst.p)};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${i+1}</div>
              <div style="font-size:14px;line-height:1.5">${h}</div>
            </div>`).join('')}
        </div>
      </div>`:''}
    </div>`;
}

/* ═══════════════════════════════════════════════════════════
   SUPERVISOR
═══════════════════════════════════════════════════════════ */
function supV(){
  if(S.tab===0) return supProfile();
  if(S.tab===1) return supTeam();
  return supPerf();
}

function supProfile(){
  const pr=DB.getProfile(S.user); const u=USERS[S.user]; const sq=SQUADS[u.squad];
  if(!pr) return`<div class="pc"><div class="es">Perfil não encontrado.</div></div>`;
  const dm=DISC_META[pr.profile];
  return`
    <div class="ph"><div class="pt">Meu Perfil DISC</div><div class="ps">${sq?sq.name:''}</div></div>
    <div class="pc"><div style="max-width:480px">
      <div style="background:${dm.color};border-radius:var(--r);padding:28px 32px;color:#fff;margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;opacity:.8">Seu perfil</div>
        <div style="font-size:44px;font-weight:800;margin-top:4px">${pr.profile}</div>
        <div style="font-size:20px;font-weight:700">${dm.name}</div>
        <div style="font-size:14px;opacity:.85;margin-top:8px">${u.name}</div>
      </div>
      <div class="card">
        <div style="font-size:14px;line-height:1.7;color:#374151">${PROFILES[pr.profile].insight}</div>
        <div style="margin-top:20px">
          <button class="bsm" onclick="resetP()">Refazer questionário</button>
        </div>
      </div>
    </div></div>`;
}
function resetP(){
  if(confirm('Refazer o questionário DISC?')){ DB.setProfile(S.user,null); S.view='setup'; S.setup={idx:0,ans:[]}; R(); }
}

function supTeam(){
  const u=USERS[S.user]; const sq=SQUADS[u.squad];
  const cls=Object.keys(USERS).filter(k=>USERS[k].sup===S.user);
  const prs=DB.getProfiles();
  return`
    <div class="ph"><div class="pt">Meu Time</div><div class="ps">${cls.length} closer${cls.length!==1?'s':''} · ${sq?sq.name:''}</div></div>
    <div class="pc">
      ${cls.length===0?`<div class="es"><div style="font-size:40px">👥</div><div style="margin-top:12px;font-size:14px">Nenhum closer no squad ainda.</div></div>`:`
      <div style="display:flex;flex-direction:column;gap:10px">
        ${cls.map(k=>{
          const cu=USERS[k]; const cp=prs[k];
          const ms=closerMeetings(k); const cr=convRate(ms);
          return`<div class="mc">
            <div class="av" style="background:${cp?dc(cp.profile):'#9CA3AF'}">${ini(cu.name)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px">${cu.name}</div>
              <div style="font-size:12px;color:var(--text2)">${ms.length} reunião${ms.length!==1?'s':''}${cr!==null?' · '+cr+'% conv.':''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="db ${cp?cp.profile:'none'}">${cp?cp.profile:'?'}</div>
              <div style="text-align:right">
                <div style="font-size:20px;font-weight:800;color:${cr!==null?'var(--D)':'#9CA3AF'}">${cr!==null?cr+'%':'—'}</div>
                <div style="font-size:11px;color:var(--text2)">conversão</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>`;
}

function supPerf(){
  const u=USERS[S.user]; const sq=SQUADS[u.squad];
  const ms=squadMeetings(u.squad);
  const g=ms.filter(m=>m.outcome==='ganho').length;
  const p=ms.filter(m=>m.outcome==='perdido').length;
  const f=ms.filter(m=>m.outcome==='followup').length;
  const cr=convRate(ms); const ps=pStats(ms); const mx=Math.max(...ps.map(x=>x.n),1);
  const cls=Object.keys(USERS).filter(k=>USERS[k].sup===S.user);
  const prs=DB.getProfiles();
  return`
    <div class="ph"><div class="pt">Performance do Time</div><div class="ps">${sq?sq.name:''}</div></div>
    <div class="pc">
      <div class="g4" style="margin-bottom:20px">
        <div class="card"><div class="ct">Total</div><div class="cv">${ms.length}</div></div>
        <div class="card"><div class="ct">Ganhos</div><div class="cv" style="color:#059669">${g}</div></div>
        <div class="card"><div class="ct">Perdidos</div><div class="cv" style="color:#DC2626">${p}</div></div>
        <div class="card"><div class="ct">Conversão</div><div class="cv" style="color:var(--D)">${cr!==null?cr+'%':'—'}</div></div>
      </div>
      <div class="g2" style="margin-bottom:20px">
        <div class="card"><div class="st">Atendimentos por perfil</div>
          ${ps.map(x=>`<div class="sbr"><div class="sbl" style="color:${dc(x.p)}">${x.p}</div><div class="sbt"><div class="sbf" style="width:${mx?x.n/mx*100:0}%;background:${dc(x.p)}"></div></div><div class="sbn">${x.n}</div></div>`).join('')}
        </div>
        <div class="card"><div class="st">Conversão por perfil</div>
          ${ps.map(x=>`<div class="sbr"><div class="sbl" style="color:${dc(x.p)}">${x.p}</div><div class="sbt"><div class="sbf" style="width:${x.conv||0}%;background:${dc(x.p)}"></div></div><div class="sbn">${x.conv!==null?x.conv+'%':'—'}</div></div>`).join('')}
        </div>
      </div>
      ${cls.length>0?`<div class="card"><div class="st">Ranking do time</div>
        ${cls.map(k=>{
          const cu=USERS[k]; const cp=prs[k];
          const cm=closerMeetings(k); const cg=cm.filter(m=>m.outcome==='ganho').length;
          const cd=cm.filter(m=>m.outcome==='ganho'||m.outcome==='perdido').length;
          const cc=cd?Math.round(cg/cd*100):null;
          return`<div class="mr">
            <div class="av" style="width:32px;height:32px;font-size:12px;background:${cp?dc(cp.profile):'#9CA3AF'}">${ini(cu.name)}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${cu.name}</div>
              <div style="font-size:12px;color:var(--text2)">${cm.length} reuniões${cp?' · '+cp.profile:''}</div>
            </div>
            <div style="font-size:20px;font-weight:800;color:${cc!==null?(cc>=50?'#059669':'#DC2626'):'#9CA3AF'}">${cc!==null?cc+'%':'—'}</div>
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
}

/* ═══════════════════════════════════════════════════════════
   GERENTE
═══════════════════════════════════════════════════════════ */
function gerenteV(){
  if(S.tab===0) return gOverview();
  if(S.tab===1) return gSquads();
  return gVendedores();
}

function gOverview(){
  const all=DB.getMeetings();
  const g=all.filter(m=>m.outcome==='ganho').length;
  const p=all.filter(m=>m.outcome==='perdido').length;
  const f=all.filter(m=>m.outcome==='followup').length;
  const cr=convRate(all); const ps=pStats(all); const mx=Math.max(...ps.map(x=>x.n),1);
  const prs=DB.getProfiles();
  const totalCl=Object.keys(USERS).filter(k=>USERS[k].role==='closer').length;
  const setupCl=Object.keys(USERS).filter(k=>USERS[k].role==='closer'&&prs[k]).length;
  return`
    <div class="ph">
      <div class="pt">Visão Geral</div>
      <div class="ps">${new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <div class="pc">
      <div class="g4" style="margin-bottom:20px">
        <div class="card"><div class="ct">Reuniões</div><div class="cv">${all.length}</div></div>
        <div class="card"><div class="ct">Ganhos</div><div class="cv" style="color:#059669">${g}</div></div>
        <div class="card"><div class="ct">Follow-up</div><div class="cv" style="color:#D97706">${f}</div></div>
        <div class="card"><div class="ct">Conv. Geral</div><div class="cv" style="color:var(--D)">${cr!==null?cr+'%':'—'}</div></div>
      </div>
      <div class="g3" style="margin-bottom:20px">
        ${Object.keys(SQUADS).map(sq=>{
          const s=SQUADS[sq]; const sm=squadMeetings(sq);
          const sg=sm.filter(m=>m.outcome==='ganho').length;
          const sd=sm.filter(m=>m.outcome==='ganho'||m.outcome==='perdido').length;
          const sc=sd?Math.round(sg/sd*100):null;
          const nCl=Object.keys(USERS).filter(k=>USERS[k].squad===sq&&USERS[k].role==='closer').length;
          return`<div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
              <div style="width:10px;height:10px;border-radius:3px;background:${s.color}"></div>
              <div style="font-weight:800;font-size:15px">${s.name}</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
              <div><div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase">Reuniões</div><div style="font-size:26px;font-weight:800">${sm.length}</div></div>
              <div><div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase">Conversão</div><div style="font-size:26px;font-weight:800;color:${sc!==null?'var(--D)':'#9CA3AF'}">${sc!==null?sc+'%':'—'}</div></div>
            </div>
            <div style="font-size:12px;color:var(--text2)">${nCl} closers · Sup: ${USERS[s.sup].name.split(' ')[0]}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="g2">
        <div class="card"><div class="st">Reuniões por perfil (empresa toda)</div>
          ${ps.map(x=>`<div class="sbr"><div class="sbl" style="color:${dc(x.p)}">${x.p}</div><div class="sbt"><div class="sbf" style="width:${mx?x.n/mx*100:0}%;background:${dc(x.p)}"></div></div><div class="sbn">${x.n}</div></div>`).join('')}
        </div>
        <div class="card"><div class="st">Conversão por perfil (empresa toda)</div>
          ${ps.map(x=>`<div class="sbr"><div class="sbl" style="color:${dc(x.p)}">${x.p}</div><div class="sbt"><div class="sbf" style="width:${x.conv||0}%;background:${dc(x.p)}"></div></div><div class="sbn">${x.conv!==null?x.conv+'%':'—'}</div></div>`).join('')}
        </div>
      </div>
      <div style="margin-top:16px;font-size:13px;color:var(--text2)">
        ${setupCl} de ${totalCl} closers com perfil DISC preenchido.
      </div>
    </div>`;
}

function gSquads(){
  const prs=DB.getProfiles();
  return`
    <div class="ph"><div class="pt">Squads</div><div class="ps">Detalhamento por squad e supervisor</div></div>
    <div class="pc">
      ${Object.keys(SQUADS).map(sq=>{
        const s=SQUADS[sq]; const sup=USERS[s.sup]; const sp=prs[s.sup];
        const cls=Object.keys(USERS).filter(k=>USERS[k].squad===sq&&USERS[k].role==='closer');
        return`<div style="margin-bottom:32px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
            <div style="width:14px;height:14px;border-radius:4px;background:${s.color}"></div>
            <div style="font-size:18px;font-weight:800">${s.name}</div>
            <div style="font-size:13px;color:var(--text2)">Supervisor: ${sup.name}</div>
            <div class="db ${sp?sp.profile:'none'}">${sp?sp.profile:'?'}</div>
          </div>
          ${cls.length===0?`<div style="color:var(--text2);font-size:14px;padding:12px 0;font-style:italic">Nenhum closer ainda.</div>`:`
          <div style="display:flex;flex-direction:column;gap:8px">
            ${cls.map(k=>{
              const cu=USERS[k]; const cp=prs[k];
              const ms=closerMeetings(k); const cg=ms.filter(m=>m.outcome==='ganho').length;
              const cd=ms.filter(m=>m.outcome==='ganho'||m.outcome==='perdido').length;
              const cc=cd?Math.round(cg/cd*100):null;
              return`<div class="mc">
                <div class="av" style="background:${cp?dc(cp.profile):'#9CA3AF'}">${ini(cu.name)}</div>
                <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">${cu.name}</div><div style="font-size:12px;color:var(--text2)">${ms.length} reuniões</div></div>
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="db ${cp?cp.profile:'none'}">${cp?cp.profile:'?'}</div>
                  <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:${cc!==null?'var(--D)':'#9CA3AF'}">${cc!==null?cc+'%':'—'}</div><div style="font-size:11px;color:var(--text2)">conv.</div></div>
                </div>
              </div>`;
            }).join('')}
          </div>`}
        </div>`;
      }).join('')}
    </div>`;
}

function gVendedores(){
  const prs=DB.getProfiles();
  const cls=Object.keys(USERS).filter(k=>USERS[k].role==='closer');
  const all=DB.getMeetings();
  const sorted=cls.sort((a,b)=>{
    const am=all.filter(m=>m.closer===a); const bm=all.filter(m=>m.closer===b);
    const ag=am.filter(m=>m.outcome==='ganho').length; const ad=am.filter(m=>m.outcome==='ganho'||m.outcome==='perdido').length;
    const bg=bm.filter(m=>m.outcome==='ganho').length; const bd=bm.filter(m=>m.outcome==='ganho'||m.outcome==='perdido').length;
    return (bd?bg/bd:-1)-(ad?ag/ad:-1);
  });
  return`
    <div class="ph"><div class="pt">Vendedores</div><div class="ps">${cls.length} closers · ordenados por conversão</div></div>
    <div class="pc"><div style="display:flex;flex-direction:column;gap:10px">
      ${sorted.map(k=>{
        const cu=USERS[k]; const cp=prs[k]; const sq=SQUADS[cu.squad];
        const ms=all.filter(m=>m.closer===k);
        const mg=ms.filter(m=>m.outcome==='ganho').length;
        const md=ms.filter(m=>m.outcome==='ganho'||m.outcome==='perdido').length;
        const mc=md?Math.round(mg/md*100):null;
        return`<div class="mc">
          <div class="av" style="background:${cp?dc(cp.profile):'#9CA3AF'}">${ini(cu.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${cu.name}</div>
            <div style="font-size:12px;color:var(--text2)">${sq?sq.name:'—'} · ${ms.length} reuniões</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="db ${cp?cp.profile:'none'}">${cp?cp.profile:'?'}</div>
            <div style="text-align:right">
              <div style="font-size:22px;font-weight:800;color:${mc!==null?'var(--D)':'#9CA3AF'}">${mc!==null?mc+'%':'—'}</div>
              <div style="font-size:11px;color:var(--text2)">conversão</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div></div>`;
}

/* ═══════════════════════════════════════════════════════════
   BIND & INIT
═══════════════════════════════════════════════════════════ */
function bind(){
  const lp=document.getElementById('lp'); if(lp) lp.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  const lu=document.getElementById('lu'); if(lu) lu.addEventListener('keydown',e=>{if(e.key==='Enter')lp&&lp.focus();});
}

R();
</script>
</body>
